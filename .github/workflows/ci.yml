name: QA Automation Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps
      - name: Run API Tests
        run: npm run test:api
        env:
          CI: true
          API_BASE_URL: https://restful-booker.herokuapp.com
          API_AUTH_USERNAME: admin
          API_AUTH_PASSWORD: password123
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  test-ui:
    name: UI Tests (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps
      - name: Run UI Tests - ${{ matrix.project }}
        run: npx playwright test --project=${{ matrix.project }}
        env:
          CI: true
          SAUCE_DEMO_URL: https://www.saucedemo.com/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results-${{ matrix.project }}
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  test-accessibility:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps
      - name: Run Accessibility Tests
        run: npm run test:a11y
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-test-results
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  test-responsive:
    name: Responsive Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps
      - name: Run Responsive Tests
        run: npm run test:responsive
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: responsive-test-results
          path: |
            playwright-report/
            test-results/
          retention-days: 30
